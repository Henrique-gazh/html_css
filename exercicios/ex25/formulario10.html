<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Exemplo de Formulario</h1>
    <form action="" method="get" autocomplete="on">
    <p>
        <label for="iano">E que ano voce nasceu: </label>
        <input type="number" name="ano" id="iano" min="1900" max="2026" value="2020"
        oninput="calcIdade()">
    </p>

    <p>
        <label for="idade">Sua idade e: </label>
        <output id="idade">0</output>
    </p>

    </p>
    <p>
        <input type="submit" value="Enviar">
        <input type="reset" value="limpar">
    </p>

    <script>
        function calcIdade() {
            let atual = new Date().getFullYear()
            idade.innerHTML = Number(atual) - Number(iano.value) 
        }
    </script>
    </form>
</body>
</html>
