<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Exemplo Formulário</h1>
    <form action="cadastro.php" method="post" autocomplete="on">
        
        <fieldset>
            <legend>Sexo</legend>
            <input type="radio" name="sexo" id="imas" value="M">
            <label for="imas">Masculino</label><br>
            
            <input type="radio" name="sexo" id="ifes" value="F">
            <label for="ifes">Feminino</label><br>
        </fieldset>
        
        <fieldset>
            <legend>Esportes favoritos</legend>
            <input type="checkbox" name="esbas" id="iesbas" value="basquete" checked>
            <label for="iesbas">Basquete</label><br>
            
            <input type="checkbox" name="esfut" id="iesfut" value="futebol" checked>
            <label for="iesfut">Futebol</label><br>
            
            <input type="checkbox" name="esnat" id="iesnat" value="natacao">
            <label for="iesnat">Natação</label><br>
            
            <input type="checkbox" name="esten" id="iesten" value="tenis">
            <label for="iesten">Tênis</label><br>
        </fieldset>
        
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
