<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card do Android</title>
    <style>
        * {
            margin: 0%;
            padding: 0%;
        }
        body {
            background-image: url(imagens/wallpaper003.jpg);
            background-position: center center;
            background-repeat: no-repeat;
        }
        div.quadrado {
            margin: 50px auto;
            height: 300px;
            width: 300px;
            border-radius: 20px;
            border: 2px solid black;
            background-image: url('https://gustavoguanabara.github.io/html-css/imagens/mascote.png'), linear-gradient(to top, skyblue, white);
            background-size: 80px;
            background-repeat: no-repeat;
            background-position: center center;
        }
    </style>
</head>
<body>
    <div class="quadrado"></div>
</body>
</html>
