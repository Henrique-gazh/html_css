<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treino2</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        table {
            width: 600px;
            border-collapse: collapse;
        }
        .tamanho {
            width: 50px;
        }
        .num {
            text-align: right;
        }
        td, th {
            border: 1px solid black;
            padding: 5px;
        }
        caption {
            background-color: lightblue;
            padding: 10px;
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <caption>Alunos: Materias(Notas)</caption>
            <tr>
                <th scope="col">Aluno</th>
                <th scope="col" class="tamanho">Matemática</th>
                <th scope="col" class="tamanho">História</th>
            </tr>
            <tr>
                <th scope="row">Hiro</th>
                <td class="num">10</td>
                <td class="num">10</td>
            </tr>
            <tr>
                <th scope="row">Gabriel</th>
                <td class="num">10</td>
                <td class="num">10</td>
            </tr>
        </thead>
    </table>
</body>
</html>
