<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treino lista</title>
</head>
<body>
    <h1>Minha Lista de Compras</h1>
    <ul style="list-style-type: square;">
        <li>Arroz</li>
        <li>Feijão</li>
        <li>Carne</li>
        <li>Refrigerante</li>
    </ul>
    <h2>Passos para fazer um lanche</h2>
    <ol>  
        <li>Pegar o pão</li>
        <li>Colocar o recheio</li>
        <li>Montar o lanche</li>
        <li>Comer</li>
    </ol>
    <!-- li significa list item (item da lista) -->
</body>
</html>
