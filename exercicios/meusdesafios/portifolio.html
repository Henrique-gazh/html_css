<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treino</title>
    <style>
        body {
            background-color: black;
            margin: 0;
        }
        .bloco {
            color: white;
            background-color: rgb(119, 118, 118);
            width: 300px;
            margin: 207px auto;
            padding: 20px;
            border: 1px solid white;
            border-radius: 20px;
        }
        .bloco a{
            text-decoration: none;
            color: white;
        }
        .bloco a:hover {
            text-decoration: underline;
            background-color: cadetblue;
            border-radius: 5px;
            color: darkblue;
        }
        .bloco a:visited {
            color: red;
        }
        .bloco a:active{
            color: black;
            text-decoration: underline;
        }
        .bloco h1, p {
            margin: 0px;
            text-align: center;
        }
        .bloco ul {
            margin-bottom: 10px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="bloco">
        <h1>Meu nome e Gabriel</h1>
        <p>Eu gosto de estudar</p>
        <ul>
            <li>HTML</li>
            <li>CSS</li>
            <li>JAVA</li>
        </ul>
        <a href="https://www.instagram.com/direct/t/17848151687782378/">Instagram</a>
    </div>
</body>
</html>
