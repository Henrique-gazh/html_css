<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'grafity';
            src: url('fonts/Jraot-Hollow.ttf') format('truetype'), url('fonts/Jraot-Outline.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;


        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1em;
        }

        h1 {
            font-family: 'grafity', 'Times New Roman', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>

<body>
    <h1>Titulo</h1>
    <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Officiis ipsum voluptas voluptates facilis cum sunt
        nostrum dolores consequuntur quisquam, debitis inventore laudantium deserunt illo consectetur quidem unde atque
        blanditiis quam!</p>
</body>

</html>
