<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
    <title>Tags HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML, podemos inserir os elementos da lista a seguir. Passe o mouse</p>
    <p>sobre os termos para descobrir qual tag devera utilizar em cada disco.</p>
    <ul>
        <li>
            <abbr title="Use a tag &lt;p&gt;"><strong>Paragrafos</strong></abbr>
        </li>
        <li>
        <abbr title="Use a tag &lt;H1&gt;"><strong>Titulos</strong></abbr>
            </li>
        <li>
            <abbr title="Use a tag &lt;img&gt;"><strong>Imagens</strong></abbr>
        </li>
        <li>
            <abbr title="Use a tag &lt;abbr&gt;"><strong>Abreviaçoes</strong></abbr>
        </li>
        <li>
            <abbr title="Use a tag &lt;code&gt;"><strong>Codigos-Fontes</strong></abbr>
        </li>
        <li>
            <abbr title="Use a tag &lt;ol&gt;"><strong>Listas numeradas</strong></abbr>
        </li>
        <li>
            <abbr title="Use a tag &lt;ul&gt;"><strong>Listas com dermacadores</strong></abbr>
        </li>
    </ul>
</body>
</html>
